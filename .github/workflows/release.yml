name: Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v2.1.3, etc.

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Fyne requires native compilation environments for GUI apps
        include:
          - os: ubuntu-latest
            artifact_name: p2p-torrent-client
            asset_name: p2p-torrent-client-linux-amd64
          - os: windows-latest
            artifact_name: p2p-torrent-client.exe
            asset_name: p2p-torrent-client-windows-amd64.exe
          - os: macos-latest
            artifact_name: p2p-torrent-client
            asset_name: p2p-torrent-client-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '`1.22`'
          cache: true

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libx11-dev xorg-dev

      - name: Build CLI
        run: |
          go build -ldflags="-s -w" -o build/cli/${{ matrix.artifact_name }} ./cmd/torrent/main.go

      - name: Build GUI
        run: |
          go build -ldflags="-s -w" -o build/gui/${{ matrix.artifact_name }} ./cmd/gui/main.go

      - name: Archive Binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          tar -czvf ${{ matrix.asset_name }}.tar.gz -C build/ cli/ gui/

      - name: Archive Binaries (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build\* -DestinationPath ${{ matrix.asset_name }}.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
          generate_release_notes: true
          draft: false